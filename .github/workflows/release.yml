# Builds the Windows installer and the Raspberry Pi (arm64) .deb, then
# publishes them to a draft GitHub Release whenever a `v*` tag is pushed:
#   git tag v0.3.3 && git push origin v0.3.3
# → wait for this workflow → review the draft on the Releases page → publish.
#
# IMPORTANT: scripts/update-pi.sh reads /releases/latest, which the GitHub
# API only returns for *published* releases. A draft is invisible to it, so
# the Pi will report "no published release found" until you hit Publish.
#
# The arm64 leg runs on ubuntu-24.04-arm — GitHub's free hosted ARM runner
# for public repositories. It builds natively, so no cross-compilation or
# QEMU is involved. Its apt list is kept in step with scripts/setup-pi.sh.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-24.04-arm
            name: raspberry-pi-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}
      - name: Install Tauri system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev \
            libxdo-dev libdbus-1-dev patchelf
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PiYTmusic ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: true
          prerelease: false
