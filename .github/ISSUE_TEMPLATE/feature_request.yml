name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: I always have to… / It's annoying that…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      placeholder: Describe the feature or behavior you'd want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
