<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/piytmusic-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiYTmusic</title>
    <script>
      // Resolve and apply the persisted theme class before first paint to
      // avoid a light-mode flash while next-themes hydrates. Mirrors the
      // ThemeProvider config in src/App.tsx (storageKey, default).
      (function () {
        try {
          var t = localStorage.getItem("ytm-theme") || "dark";
          var resolved =
            t === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : t;
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
